<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Capital Inteligente</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle at 70% 30%, #0f1c2e, #081018);
  color:white;
}

/* ЛЕЙАУТ */
.container {
  display:flex;
  justify-content:space-between;
  padding:60px;
}

/* ЛЕВАЯ ЧАСТЬ */
.left {
  width:45%;
} 
.sphere {
  position: relative;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  animation: rotate 40s linear infinite;
}

.city {
  position: absolute;
  color: #00ffc8;
  font-size: 12px;
  background: rgba(0,255,200,0.1);
  padding: 5px 10px;
  border-radius: 10px;
}

@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
h1 {
  font-size:60px;
  margin:10px 0;
}

.green {
  color:#00ffc8;
}

.desc {
  color:#8aa0b3;
  margin-bottom:20px;
}

.btn {
  background:#00ffc8;
  color:black;
  padding:12px 20px;
  border-radius:10px;
  display:inline-block;
  margin-bottom:20px;
}

/* КУРСЫ */
.prices span {
  display:inline-block;
  margin:5px;
  padding:8px 14px;
  border-radius:8px;
  background:rgba(255,255,255,0.05);
}

/* КАРТОЧКИ */
.cards {
  display:flex;
  gap:20px;
  margin-top:20px;
}

.card {
  flex:1;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(0,255,200,0.2);
  box-shadow:0 0 20px rgba(0,255,200,0.1);
}

.card .value {
  font-size:24px;
  color:#00ffc8;
  font-weight:bold;
}

.card .label {
  font-size:12px;
  color:#8aa0b3;
}

/* ПРАВАЯ ЧАСТЬ */
.right {
  width:50%;
  position:relative;
}

/* ГЛОБУС */
.sphere {
  width:400px;
  height:400px;
  border-radius:50%;
  background:radial-gradient(circle, #00ffc820, transparent);
  position:relative;
  margin:auto;
  box-shadow:0 0 80px rgba(0,255,200,0.3);
}

/* ТОЧКИ */
.dot {
  position:absolute;
  width:4px;
  height:4px;
  background:#00ffc8;
  border-radius:50%;
}

/* ГОРОДА */
.city {
  position:absolute;
  color:#00ffc8;
  font-size:12px;
  padding:6px 10px;
  border:1px solid rgba(0,255,200,0.3);
  border-radius:8px;
  background:rgba(0,255,200,0.05);
  backdrop-filter: blur(6px);
  box-shadow: 0 0 10px rgba(0,255,200,0.2);
}

/* ЛИНИИ */
.line {
  position:absolute;
  height:1px;
  background:rgba(0,255,200,0.3);
  transform-origin:left;
}

/* ГРАФИК */
.chart {
  margin-top:30px;
  padding:20px;
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  border:1px solid rgba(0,255,200,0.2);
} .chart {
  margin-top:30px;
  padding:20px;
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  border:1px solid rgba(0,255,200,0.2);
}

/* ВОТ СЮДА 👇 */
.sphere-wrap {
  animation: rotate 40s linear infinite;
}

@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">

<div class="left">
  <div class="desc">Plataforma de inversión digital</div>
  <h1>Capital <span class="green">Inteligente</span></h1>
  <div class="desc">Optimiza tus inversiones con datos reales del mercado en tiempo real.</div>

  <div class="btn">Comenzar ahora</div>

  <div class="prices">
    <span id="btc">BTC ...</span>
    <span id="eth">ETH ...</span>
    <span id="usd">USD 1.00</span>
    <span id="mxn">MXN 17.48</span>
  </div>

  <div class="cards">
    <div class="card">
      <div class="value" id="profit">+0</div>
      <div class="label">Profit</div>
    </div>

    <div class="card">
      <div class="value" id="win">0%</div>
      <div class="label">Win Rate</div>
    </div>

    <div class="card">
      <div class="value">1:3.7</div>
      <div class="label">Risk</div>
    </div>
  </div>
</div>

<div class="right">

<div class="sphere" id="sphere">

  <div class="city" style="top:20%; left:70%">New York +0.32%</div>
  <div class="city" style="top:15%; left:55%">London +0.45%</div>
  <div class="city" style="top:25%; left:65%">Tokyo +0.67%</div>
  <div class="city" style="top:45%; left:60%">São Paulo +0.21%</div>
  <div class="city" style="top:35%; left:90%">Singapore +0.38%</div>

</div>
 
<script src="https://s3.tradingview.com/tv.js"></script>

<script>
new TradingView.widget({
  "container_id": "tv_chart",
  "width": "100%",
  "height": 300,
  "symbol": "BINANCE:BTCUSDT",
  "interval": "15",
  "theme": "dark",
  "style": "1",
  "locale": "es"
});
</script>  </div>

</div>

</div>

<script>
/* РЕАЛЬНЫЕ ДАННЫЕ (Binance) */
async function loadPrices(){
  let btc = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT').then(r=>r.json());
  let eth = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT').then(r=>r.json());

  document.getElementById("btc").innerText = "BTC: " + Math.round(btc.price);
  document.getElementById("eth").innerText = "ETH: " + Math.round(eth.price);

  document.getElementById("profit").innerText = "+" + (Math.random()*9000).toFixed(0);
  document.getElementById("win").innerText = (80 + Math.random()*10).toFixed(2) + "%";
}

loadPrices();
setInterval(loadPrices, 5000);

/* ТОЧКИ */
let sphere = document.getElementById("sphere");

for(let i=0;i<200;i++){
  let d = document.createElement("div");
  d.className = "dot";
  d.style.top = Math.random()*100 + "%";
  d.style.left = Math.random()*100 + "%";
  sphere.appendChild(d);
}

/* ЛИНИИ */
for(let i=0;i<40;i++){
  let l = document.createElement("div");
  l.className = "line";
  l.style.width = Math.random()*200 + "px";
  l.style.top = Math.random()*100 + "%";
  l.style.left = Math.random()*100 + "%";
  l.style.transform = "rotate(" + Math.random()*360 + "deg)";
  sphere.appendChild(l);
}
</script>

</body>
</html>
