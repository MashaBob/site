<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Capital Inteligente</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

.container{
  display:flex;
  padding:60px;
}

.left{width:45%}
.right{width:55%; position:relative}

h1{
  font-size:55px;
}

.green{color:#00ffc8}

.btn{
  background:#00ffc8;
  color:black;
  padding:15px 30px;
  border-radius:10px;
  margin-top:20px;
  display:inline-block;
}

/* cards */
.cards{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  margin-top:30px;
}

.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:15px;
  padding:20px;
}

.value{
  font-size:22px;
  font-weight:bold;
  color:#00ffc8;
}

/* coins */
.coins{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.coin{
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:10px;
}

/* globe fake */
.globe{
  width:400px;
  height:400px;
  border-radius:50%;
  background:radial-gradient(circle,#00ffc8 2px, transparent 2px);
  background-size:20px 20px;
  position:absolute;
  right:50px;
  top:0;
  box-shadow:0 0 40px rgba(0,255,200,0.3);
}

/* chart */
.chart{
  margin-top:420px;
}

iframe{
  width:100%;
  height:300px;
  border:none;
}
</style>
</head>

<body>

<div class="container">

<div class="left">

<h1>Capital <span class="green">Inteligente</span></h1>

<p>Optimiza tus inversiones con datos reales del mercado en tiempo real.</p>

<div class="btn">Comenzar ahora</div>

<div class="coins">
  <div class="coin" id="btc">BTC...</div>
  <div class="coin" id="eth">ETH...</div>
  <div class="coin" id="mxn">MXN...</div>
</div>

<div class="cards">
  <div class="card">
    <div>Profit</div>
    <div class="value" id="profit">...</div>
  </div>

  <div class="card">
    <div>Win Rate</div>
    <div class="value" id="win">...</div>
  </div>

  <div class="card">
    <div>Risk</div>
    <div class="value">1:3.7</div>
  </div>

  <div class="card">
    <div>Trades</div>
    <div class="value" id="trades">...</div>
  </div>
</div>

</div>

<div class="right">

<div class="globe"></div>

<div class="chart">
<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=15"></iframe>
</div>

</div>

</div>

<script>
// API DATA
let startPrice = null
let trades = 0

async function load(){
  let btc = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT").then(r=>r.json())
  let eth = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT").then(r=>r.json())
  let usd = await fetch("https://api.exchangerate-api.com/v4/latest/USD").then(r=>r.json())

  let btcPrice = parseFloat(btc.price)
  let ethPrice = parseFloat(eth.price)

  document.getElementById("btc").innerText = "BTC: " + btcPrice.toLocaleString()
  document.getElementById("eth").innerText = "ETH: " + ethPrice.toLocaleString()
  document.getElementById("mxn").innerText = "MXN: " + usd.rates.MXN.toFixed(2)

  if(!startPrice) startPrice = btcPrice

  let profit = ((btcPrice - startPrice) / startPrice * 1000).toFixed(2)
  document.getElementById("profit").innerText = "+" + profit

  let win = 70 + Math.random()*20
  document.getElementById("win").innerText = win.toFixed(2) + "%"

  trades += Math.floor(Math.random()*3)
  document.getElementById("trades").innerText = trades
}

load()
setInterval(load,5000)
</script>

</body>
</html>
